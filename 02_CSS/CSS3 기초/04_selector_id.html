<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #header {
        background-color: red;
        width: 500px;
        height: 25px;
        margin-bottom: 5px;
        font-weight: bold;
      }
      #aside {
        background-color: blue;
        float: left;
        width: 150px;
        height: 50px;
        font-weight: bold;
      }
      #content {
        background-color: green;
        width: 350px;
        height: 50px;
        float: left;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div id="header">#header 태그</div>
      <div id="aside">#aside 태그</div>
      <div id="content">#content</div>
    </div>
  </body>
</html>
